name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - name: Install
        run: npm ci
      - name: Test
        run: npm run test
      - name: Test browsers
        run: npx jackrabbit_webdriver .github/workflows/browser.json ./tests/dist/core/mod.js ./tests/dist/commands/mod.js
